name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Build release binary
        run: cargo build --release
      - name: Package
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          mkdir -p dist/nethack-babel
          cp target/release/nethack-babel dist/nethack-babel/
          cp -r data dist/nethack-babel/
          cp README.md LICENSE dist/nethack-babel/
          cd dist && tar czf "nethack-babel-v${VERSION}-aarch64-apple-darwin.tar.gz" nethack-babel
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
